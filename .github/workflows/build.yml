name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.*"
          cache: true

      - name: Configure VRPN
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/vrpn-install

      - name: Build VRPN
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      # Install so that vrpn_Qt_GUI_server can find it
      - name: Install VRPN
        run: cmake --install build --config Release

      - name: Configure vrpn_Qt_GUI_server
        run: >
          cmake -B build-qt -S vrpn_Qt_GUI_server
          -DCMAKE_BUILD_TYPE=Release
          -DVRPN_ROOT_DIR=${{ github.workspace }}/vrpn-install
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/vrpn-install

      - name: Build vrpn_Qt_GUI_server
        run: cmake --build build-qt --config Release --parallel
